services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: releasedesk
      POSTGRES_USER: releasedesk_user
      POSTGRES_PASSWORD: releasedesk_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DB_NAME: releasedesk
      DB_USER: releasedesk_user
      DB_PASSWORD: releasedesk_password
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data: